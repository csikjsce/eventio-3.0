version: "3.8"

services:
    # Backend service
    backend:
        image: ghcr.io/csikjsce/eventio-backend:latest
        build:
            context: ./backend
            dockerfile: dockerfile
        container_name: eventio-backend
        ports:
            - "8000:8000"
        environment:
            - NODE_ENV=production
            - PORT=8000
            - DATABASE_URL=${DATABASE_URL}
            - DIRECT_URL=${DIRECT_URL}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            - GOOGLE_CALLBACK_URL=/api/v1/auth/google/callback
            - JWT_SECRET=${JWT_SECRET}
            - SESSION_SECRET=${SESSION_SECRET}
            - CLIENT_URL=${CLIENT_URL}
            - COUNCIL_CLIENT_URL=${COUNCIL_CLIENT_URL}
            - FACULTY_CLIENT_URL=${FACULTY_CLIENT_URL}
            - SERVER_URL=${SERVER_URL}
            - AT_EXPIRATION=${AT_EXPIRATION:-5h}
            - RT_EXPIRATION=${RT_EXPIRATION:-7d}
            - FRONTEND_REDIRECT_PATH=${FRONTEND_REDIRECT_PATH:-/login}
            - EMAIL_USER=${EMAIL_USER}
            - EMAIL_PASS=${EMAIL_PASS}
        volumes:
            - ./backend/cert:/app/cert:ro
        networks:
            - eventio-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # Frontend nginx service
    frontend:
        image: ghcr.io/csikjsce/eventio-frontend:latest
        build:
            context: .
            dockerfile: Dockerfile
            args:
                - VITE_APP_SERVER_ADDRESS=${VITE_APP_SERVER_ADDRESS:-}
        container_name: eventio-frontend
        ports:
            - "80:80"
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - eventio-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    # Watchtower — auto-pulls new images from GHCR and restarts containers
    watchtower:
        image: containrrr/watchtower
        container_name: eventio-watchtower
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        environment:
            - WATCHTOWER_POLL_INTERVAL=300
            - WATCHTOWER_CLEANUP=true
            - WATCHTOWER_INCLUDE_RESTARTING=true
        restart: unless-stopped

networks:
    eventio-network:
        driver: bridge
