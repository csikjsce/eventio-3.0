version: "3.8"

services:
    backend:
        image: ghcr.io/csikjsce/eventio-backend:latest
        build:
            context: ./backend
            dockerfile: dockerfile
        container_name: eventio-backend
        ports:
            - "8000:8000"
        environment:
            - NODE_ENV=production
            - PORT=8000
            - DATABASE_URL=${DATABASE_URL}
            - DIRECT_URL=${DIRECT_URL}
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
            - GOOGLE_CALLBACK_URL=/api/v1/auth/google/callback
            - JWT_SECRET=${JWT_SECRET}
            - SESSION_SECRET=${SESSION_SECRET}
            - CLIENT_URL=${CLIENT_URL}
            - COUNCIL_CLIENT_URL=${COUNCIL_CLIENT_URL}
            - FACULTY_CLIENT_URL=${FACULTY_CLIENT_URL}
            - SERVER_URL=${SERVER_URL}
            - AT_EXPIRATION=${AT_EXPIRATION:-5h}
            - RT_EXPIRATION=${RT_EXPIRATION:-7d}
            - FRONTEND_REDIRECT_PATH=${FRONTEND_REDIRECT_PATH:-/login}
            - EMAIL_USER=${EMAIL_USER}
            - EMAIL_PASS=${EMAIL_PASS}
        volumes:
            - ./backend/cert:/app/cert:ro
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    app:
        image: ghcr.io/csikjsce/eventio-app:latest
        build:
            context: ./frontend/app
            dockerfile: Dockerfile
            args:
                - NEXT_PUBLIC_SERVER_ADDRESS=${NEXT_PUBLIC_SERVER_ADDRESS:-http://localhost:8000}
        container_name: eventio-app
        ports:
            - "4173:3000"
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped

    council:
        image: ghcr.io/csikjsce/eventio-council:latest
        build:
            context: ./frontend/council
            dockerfile: Dockerfile
            args:
                - VITE_APP_SERVER_ADDRESS=${VITE_APP_SERVER_ADDRESS:-http://localhost:8000}
        container_name: eventio-council
        ports:
            - "3001:80"
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped

    dean:
        image: ghcr.io/csikjsce/eventio-dean:latest
        build:
            context: ./frontend/dean
            dockerfile: Dockerfile
            args:
                - VITE_APP_SERVER_ADDRESS=${VITE_APP_SERVER_ADDRESS:-http://localhost:8000}
        container_name: eventio-dean
        ports:
            - "3002:80"
        depends_on:
            backend:
                condition: service_healthy
        restart: unless-stopped
