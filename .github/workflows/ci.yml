name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  audit:
    name: Security Audit — ${{ matrix.dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - backend
          - frontend/student
          - frontend/council
          - frontend/dean
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.dir }}

      - name: Audit for high/critical vulnerabilities
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.dir }}

  build-frontends:
    name: Build — ${{ matrix.dir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - frontend/student
          - frontend/council
          - frontend/dean
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.dir }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.dir }}
